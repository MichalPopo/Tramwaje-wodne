services:
  - type: web
    name: tramwaje-wodne-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: node dist/server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: CORS_ORIGIN
        value: https://michalpopo.github.io
      - key: JWT_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
